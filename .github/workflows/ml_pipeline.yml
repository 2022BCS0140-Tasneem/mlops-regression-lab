name: ML Pipeline

on:
  push:
    branches:
      - main

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: 3.10

      - run: pip install -r requirements.txt

      - run: python train.py

  report:
    needs: train
    runs-on: ubuntu-latest

    steps:
      - run: echo "Pipeline completed successfully"
